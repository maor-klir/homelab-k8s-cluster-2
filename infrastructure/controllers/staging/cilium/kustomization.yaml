apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/cilium
  - ../../../configs/staging/cilium
helmCharts:
  - name: cilium
  - releaseName: cilium
  - version: 1.17.1
  - repo: https://helm.cilium.io/
  - namespace: kube-system
  - includeCRDs: true
  - valuesFile: values.yaml