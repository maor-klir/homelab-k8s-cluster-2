apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
- behavior: merge
  literals:
  - kustomize.buildOptions="--enable-alpha-plugins --enable-helm"

helmCharts:
  - name: argo-cd
    releaseName: argo-cd
    version: 7.8.10
    repo: ghcr.io/argoproj/argo-helm/argo-cd